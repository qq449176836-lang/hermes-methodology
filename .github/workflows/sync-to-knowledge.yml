name: Sync to hermes-agent-knowledge

on:
  push:
    branches: [main]
    paths:
      - 'CONSTITUTION.md'
      - 'EVOLUTION-ENGINE.md'
      - 'EXPERIENCE-LIFECYCLE.md'
      - 'KNOWLEDGE-CRYSTALLIZATION.md'
      - 'METHODOLOGY.md'
      - 'MULTI-AGENT-COORDINATION.md'
      - 'OPERATIONS.md'
      - 'SPEC-DRIVEN-DEV.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Push to hermes-agent-knowledge
        env:
          GIT_TOKEN: ${{ secrets.CROSS_REPO_SYNC_TOKEN }}
        run: |
          git config user.name "Hermes Sync Bot"
          git config user.email "sync@hermes-methodology"

          for file in CONSTITUTION.md EVOLUTION-ENGINE.md EXPERIENCE-LIFECYCLE.md \
            KNOWLEDGE-CRYSTALLIZATION.md METHODOLOGY.md MULTI-AGENT-COORDINATION.md \
            OPERATIONS.md SPEC-DRIVEN-DEV.md; do

            if [ -f "$file" ]; then
              echo "Syncing $file..."
              # Get current SHA from target repo
              SHA=$(curl -sn -H "Authorization: token ${GIT_TOKEN}" \
                "https://api.github.com/repos/qq449176836-lang/hermes-agent-knowledge/contents/${file}" \
                | jq -r '.sha // empty')

              # Encode and push
              CONTENT=$(base64 -w0 "$file")
              if [ -n "$SHA" ]; then
                # Update existing file
                jq -n --arg msg "Sync from hermes-methodology" \
                  --arg content "$CONTENT" --arg sha "$SHA" \
                  '{message: $msg, content: $content, sha: $sha}' \
                  | curl -sn -X PUT \
                    "https://api.github.com/repos/qq449176836-lang/hermes-agent-knowledge/contents/${file}" \
                    -H "Authorization: token ${GIT_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    -d @- > /dev/null
              else
                # Create new file
                jq -n --arg msg "Sync from hermes-methodology" \
                  --arg content "$CONTENT" \
                  '{message: $msg, content: $content}' \
                  | curl -sn -X PUT \
                    "https://api.github.com/repos/qq449176836-lang/hermes-agent-knowledge/contents/${file}" \
                    -H "Authorization: token ${GIT_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    -d @- > /dev/null
              fi
              echo "  ✓ $file synced"
            fi
          done
          echo "Sync complete!"
